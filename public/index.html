<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Gastometro - Tu aplicación de gestión móvil" />
    <meta name="theme-color" content="#007AFF" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gastometro" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23007AFF' width='180' height='180'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dominant-baseline='central' font-weight='bold'>G</text></svg>" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/Gastometro/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23007AFF' width='100' height='100'/><text x='50%' y='50%' font-size='60' fill='white' text-anchor='middle' dominant-baseline='central' font-weight='bold'>G</text></svg>" />
    
    <title>Gastometro</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #ffffff;
        color: #000000;
      }
      
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      
      .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #007AFF 0%, #0051D5 100%);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
        box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
      }
      
      h1 {
        font-size: 28px;
        margin-bottom: 10px;
        text-align: center;
      }
      
      p {
        font-size: 16px;
        color: #666;
        text-align: center;
        margin-bottom: 30px;
      }
      
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #007AFF;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .info {
        background: #f0f7ff;
        border-left: 4px solid #007AFF;
        padding: 15px;
        border-radius: 4px;
        margin-top: 20px;
        font-size: 14px;
        color: #333;
        max-width: 400px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="logo">G</div>
      <h1>Gastometro</h1>
      <p>Cargando tu aplicación...</p>
      <div class="loader"></div>
      <div class="info">
        <strong>💡 Tip para iPhone:</strong> Abre en Safari y toca "Compartir" → "Añadir a pantalla de inicio"
      </div>
    </div>

    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .register('/Gastometro/sw.js')
          .then((registration) => {
            console.log('✅ Service Worker registrado:', registration);
          })
          .catch((error) => {
            console.log('❌ Error registrando Service Worker:', error);
          });
      }

      // Redirect to actual app
      // TODO: Actualiza esto con la ruta correcta de tu app Expo
      // window.location.href = '/Gastometro/app'; // si tu app está en una subcarpeta
    </script>
  </body>
</html>
